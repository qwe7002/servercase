name: ServerCase
options:
  bundleIdPrefix: com.servercase
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.7.0"
  Argon2Swift:
    url: https://github.com/tmthecoder/Argon2Swift.git
    from: "1.0.0"

targets:
  ServerCase:
    type: application
    platform: iOS
    sources:
      - ServerCase
    dependencies:
      - package: Citadel
      - package: Argon2Swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.servercase.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: ServerCase
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
