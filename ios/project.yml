name: ServerCase
options:
  bundleIdPrefix: com.servercase
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.7.0"
  SwiftArgon2:
    url: https://github.com/mimiclone/argon2-swift.git
    from: "1.0.4"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    branch: main

targets:
  ServerCase:
    type: application
    platform: iOS
    sources:
      - ServerCase
      - Shared
    dependencies:
      - package: Citadel
      - package: SwiftArgon2
      - package: SwiftTerm
      - target: ServerCaseWidget
    info:
      path: ServerCase/Info.plist
      properties:
        CFBundleDisplayName: ServerCase
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Live Activities (ActivityKit) for the live connection widget.
        NSSupportsLiveActivities: true
        # Keep SSH connections alive briefly + schedule periodic refreshes.
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.servercase.app.refresh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.servercase.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"

  ServerCaseWidget:
    type: app-extension
    platform: iOS
    sources:
      - ServerCaseWidget
      - Shared
      - path: ServerCase/Views/Format.swift
    info:
      path: ServerCaseWidget/Info.plist
      properties:
        CFBundleDisplayName: ServerCase
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.servercase.app.widget
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
