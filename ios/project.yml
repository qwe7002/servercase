name: ServerCase
options:
  bundleIdPrefix: com.servercase
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.7.0"
  SwiftArgon2:
    url: https://github.com/mimiclone/argon2-swift.git
    from: "1.0.4"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    branch: main

targets:
  ServerCase:
    type: application
    platform: iOS
    sources:
      - ServerCase
    dependencies:
      - package: Citadel
      - package: SwiftArgon2
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.servercase.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: ServerCase
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
