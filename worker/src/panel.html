<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ServerCase Cloud</title>
    <style>
      :root {
        --bg: #0b0d10;
        --card: #15181d;
        --card2: #1b1f26;
        --line: #262b33;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #34d399;
        --danger: #f87171;
        --radius: 10px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      a { color: var(--accent); }
      .wrap { max-width: 880px; margin: 0 auto; padding: 24px 16px 64px; }
      header {
        display: flex; align-items: center; justify-content: space-between;
        gap: 12px; margin-bottom: 24px;
      }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 16px; }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
      .muted { color: var(--muted); }
      .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; }
      .card + .card { margin-top: 16px; }
      h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 12px; }
      input, button, select {
        font: inherit; border-radius: 8px; border: 1px solid var(--line);
        background: var(--card2); color: var(--text); padding: 9px 11px;
      }
      input:focus { outline: none; border-color: var(--accent); }
      input { width: 100%; }
      button {
        cursor: pointer; background: var(--accent); color: #04150e; border: none;
        font-weight: 600; padding: 9px 14px;
      }
      button.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); font-weight: 500; }
      button.danger { background: transparent; color: var(--danger); border: 1px solid var(--line); }
      button:disabled { opacity: .5; cursor: default; }
      .row { display: flex; gap: 8px; align-items: center; }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .field { display: grid; gap: 6px; margin-bottom: 12px; }
      label { font-size: 12px; color: var(--muted); }
      .badge {
        display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
        padding: 2px 8px; border-radius: 999px; background: var(--card2); border: 1px solid var(--line);
      }
      .badge.live { color: var(--accent); border-color: rgba(52,211,153,.4); }
      .host { display: flex; justify-content: space-between; align-items: center; gap: 12px;
        padding: 12px; border: 1px solid var(--line); border-radius: 8px; }
      .host + .host { margin-top: 8px; }
      .host .name { display: flex; align-items: center; gap: 8px; font-weight: 600; }
      .host .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
      .metrics { display: flex; gap: 18px; text-align: right; }
      .metric .k { font-size: 10px; text-transform: uppercase; color: var(--muted); }
      .metric .v { font-variant-numeric: tabular-nums; font-weight: 600; }
      .statusdot { width: 8px; height: 8px; border-radius: 50%; background: #4b5563; }
      .statusdot.on { background: var(--accent); }
      .msg { font-size: 13px; margin-top: 10px; }
      .msg.err { color: var(--danger); }
      .token { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; word-break: break-all; }
      .iconbtn { background: transparent; border: none; color: var(--muted); font-size: 16px; padding: 4px 8px; cursor: pointer; }
      .iconbtn:hover { color: var(--danger); }
      .empty { color: var(--muted); padding: 8px 2px; }
      .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
      .tabs button { background: transparent; border: 1px solid var(--line); color: var(--muted); font-weight: 500; }
      .tabs button.active { color: var(--text); border-color: var(--accent); }
      .alert { border: 1px solid rgba(52,211,153,.4); background: rgba(52,211,153,.07); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="brand"><span class="dot"></span> ServerCase Cloud</div>
        <div id="account" class="row"></div>
      </header>
      <div id="view"></div>
    </div>

    <script>
      const api = (path, opts = {}) => {
        const token = localStorage.getItem("sc.token");
        return fetch(path, {
          ...opts,
          headers: {
            "content-type": "application/json",
            ...(token ? { authorization: "Bearer " + token } : {}),
            ...(opts.headers || {}),
          },
        }).then(async (res) => {
          const text = await res.text();
          const data = text ? JSON.parse(text) : {};
          if (!res.ok) throw Object.assign(new Error(data.error || res.statusText), { status: res.status });
          return data;
        });
      };

      const el = (html) => {
        const t = document.createElement("template");
        t.innerHTML = html.trim();
        return t.content.firstElementChild;
      };
      const esc = (s) =>
        String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      const pct = (used, total) => (total > 0 ? Math.round((used / total) * 100) : 0);
      const fmtKb = (kb) => {
        const u = ["KB", "MB", "GB", "TB", "PB"];
        let v = kb, i = 0;
        while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
        return v.toFixed(v >= 100 || i === 0 ? 0 : 1) + " " + u[i];
      };
      const rel = (ms) => {
        if (!ms) return "never";
        const s = Math.round((Date.now() - ms) / 1000);
        if (s < 5) return "just now";
        if (s < 60) return s + "s ago";
        if (s < 3600) return Math.floor(s / 60) + "m ago";
        if (s < 86400) return Math.floor(s / 3600) + "h ago";
        return Math.floor(s / 86400) + "d ago";
      };

      const view = document.getElementById("view");
      const account = document.getElementById("account");
      let stream = null;
      let ticker = null;
      let hosts = [];

      function logout() {
        localStorage.removeItem("sc.token");
        if (stream) { stream.close(); stream = null; }
        if (ticker) { clearInterval(ticker); ticker = null; }
        renderLogin();
      }

      // ── Login ────────────────────────────────────────────────────────────
      function renderLogin(message) {
        account.innerHTML = "";
        view.innerHTML = "";
        const form = el(`
          <div class="card" style="max-width:420px;margin:8vh auto 0">
            <h2>Sign in</h2>
            <div class="field"><label>Email</label><input id="email" type="email" autocomplete="username" /></div>
            <div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password" /></div>
            <div class="row">
              <button id="login">Sign in</button>
              <button id="register" class="ghost">Create account</button>
            </div>
            <div id="msg" class="msg"></div>
          </div>`);
        view.appendChild(form);
        const msg = form.querySelector("#msg");
        if (message) msg.textContent = message;
        const auth = (mode) => async () => {
          msg.className = "msg";
          msg.textContent = "…";
          try {
            const body = JSON.stringify({
              email: form.querySelector("#email").value.trim(),
              password: form.querySelector("#password").value,
            });
            const res = await api("/v1/auth/" + mode, { method: "POST", body });
            localStorage.setItem("sc.token", res.token);
            renderDashboard(res.user);
          } catch (e) {
            msg.className = "msg err";
            msg.textContent = e.message;
          }
        };
        form.querySelector("#login").onclick = auth("login");
        form.querySelector("#register").onclick = auth("register");
        form.querySelector("#password").onkeydown = (e) => e.key === "Enter" && form.querySelector("#login").click();
      }

      // ── Dashboard ────────────────────────────────────────────────────────
      function renderDashboard(user) {
        account.innerHTML = "";
        account.appendChild(el(`<span class="badge">${esc(user.email)}</span>`));
        const out = el(`<button class="ghost">Sign out</button>`);
        out.onclick = logout;
        account.appendChild(out);

        view.innerHTML = `
          <div class="tabs">
            <button class="active" data-tab="probes">Probes</button>
            <button data-tab="devices">Devices</button>
            <button data-tab="config">Config</button>
          </div>
          <div id="tab"></div>`;
        view.querySelectorAll(".tabs button").forEach((b) => {
          b.onclick = () => {
            view.querySelectorAll(".tabs button").forEach((x) => x.classList.remove("active"));
            b.classList.add("active");
            showTab(b.dataset.tab);
          };
        });
        showTab("probes");
      }

      function showTab(tab) {
        if (stream) { stream.close(); stream = null; }
        if (ticker) { clearInterval(ticker); ticker = null; }
        if (tab === "probes") return renderProbes();
        if (tab === "devices") return renderDevices();
        if (tab === "config") return renderConfig();
      }

      // ── Probes (live) ────────────────────────────────────────────────────
      async function renderProbes() {
        const tab = document.getElementById("tab");
        tab.innerHTML = `
          <div class="card">
            <div class="row" style="justify-content:space-between">
              <h2 style="margin:0">Probe hosts</h2>
              <span id="streamBadge" class="badge">connecting…</span>
            </div>
            <div class="row" style="margin:12px 0">
              <input id="hostName" placeholder="New host name, e.g. web-1" />
              <button id="addHost">Add host</button>
            </div>
            <div id="tokenBox"></div>
            <div id="hostList"><div class="empty">Loading…</div></div>
          </div>`;
        tab.querySelector("#addHost").onclick = addHost;
        tab.querySelector("#hostName").onkeydown = (e) => e.key === "Enter" && addHost();
        await loadHosts();
        openStream();
        ticker = setInterval(paintHosts, 1000);
      }

      async function loadHosts() {
        try {
          const res = await api("/v1/probes");
          hosts = res.hosts.map((h) => ({ ...h, snapshot: h.latest || null, lastSeen: h.lastSeenAt }));
          paintHosts();
        } catch (e) {
          document.getElementById("hostList").innerHTML = `<div class="msg err">${esc(e.message)}</div>`;
        }
      }

      function paintHosts() {
        const list = document.getElementById("hostList");
        if (!list) return;
        if (hosts.length === 0) {
          list.innerHTML = `<div class="empty">No hosts yet. Add one, then deploy the agent with its token.</div>`;
          return;
        }
        list.innerHTML = "";
        for (const h of hosts) {
          const s = h.snapshot;
          const online = h.lastSeen && Date.now() - h.lastSeen < 30000;
          const card = el(`
            <div class="host">
              <div>
                <div class="name"><span class="statusdot ${online ? "on" : ""}"></span>${esc(h.name)}</div>
                <div class="meta">${s ? esc((s.hostname || "—") + " · " + (s.kernel || "—")) : "waiting for first snapshot…"}</div>
              </div>
              <div class="row">
                ${s ? `<div class="metrics">
                  <div class="metric"><div class="k">CPU</div><div class="v">${s.cpu_usage == null ? "–" : Math.round(s.cpu_usage) + "%"}</div></div>
                  <div class="metric"><div class="k">Mem</div><div class="v">${pct(s.memory.mem_used_kb, s.memory.mem_total_kb)}%</div></div>
                  <div class="metric"><div class="k">Seen</div><div class="v">${rel(h.lastSeen)}</div></div>
                </div>` : ""}
                <button class="iconbtn" title="Remove">✕</button>
              </div>
            </div>`);
          card.querySelector(".iconbtn").onclick = () => removeHost(h.id);
          list.appendChild(card);
        }
      }

      async function addHost() {
        const input = document.getElementById("hostName");
        const name = input.value.trim();
        if (!name) return;
        try {
          const res = await api("/v1/probes", { method: "POST", body: JSON.stringify({ name }) });
          input.value = "";
          const box = document.getElementById("tokenBox");
          box.innerHTML = "";
          const a = el(`
            <div class="alert">
              <div style="margin-bottom:6px">Probe token for <b>${esc(res.host.name)}</b> — copy it now, shown once:</div>
              <div class="row">
                <input class="token" readonly value="${esc(res.token)}" />
                <button class="ghost" id="copyTok">Copy</button>
                <button class="ghost" id="dismissTok">Done</button>
              </div>
            </div>`);
          box.appendChild(a);
          a.querySelector("#copyTok").onclick = () => navigator.clipboard && navigator.clipboard.writeText(res.token);
          a.querySelector("#dismissTok").onclick = () => (box.innerHTML = "");
          await loadHosts();
        } catch (e) {
          document.getElementById("tokenBox").innerHTML = `<div class="msg err">${esc(e.message)}</div>`;
        }
      }

      async function removeHost(id) {
        try {
          await api("/v1/probes/" + encodeURIComponent(id), { method: "DELETE" });
          hosts = hosts.filter((h) => h.id !== id);
          paintHosts();
        } catch (e) { alert(e.message); }
      }

      function openStream() {
        const badge = document.getElementById("streamBadge");
        const token = localStorage.getItem("sc.token");
        const url = location.origin.replace(/^http/, "ws") + "/v1/stream?token=" + encodeURIComponent(token);
        stream = new WebSocket(url);
        stream.onopen = () => { if (badge) { badge.textContent = "live"; badge.className = "badge live"; } };
        stream.onclose = () => { if (badge) { badge.textContent = "offline"; badge.className = "badge"; } };
        stream.onmessage = (ev) => {
          let m; try { m = JSON.parse(ev.data); } catch { return; }
          if (m.type !== "snapshot") return;
          const h = hosts.find((x) => x.id === m.hostId);
          if (h) { h.snapshot = m.snapshot; h.lastSeen = m.at; paintHosts(); }
        };
      }

      // ── Devices ──────────────────────────────────────────────────────────
      async function renderDevices() {
        const tab = document.getElementById("tab");
        tab.innerHTML = `<div class="card"><h2>Push devices</h2><div id="devList"><div class="empty">Loading…</div></div></div>`;
        try {
          const res = await api("/v1/devices");
          const list = tab.querySelector("#devList");
          if (res.devices.length === 0) { list.innerHTML = `<div class="empty">No devices registered.</div>`; return; }
          list.innerHTML = "";
          for (const d of res.devices) {
            const row = el(`
              <div class="host">
                <div>
                  <div class="name">${esc(d.label || d.platform)}</div>
                  <div class="meta">${esc(d.platform)} · added ${rel(d.createdAt)} · seen ${rel(d.lastSeenAt)}</div>
                </div>
                <button class="iconbtn" title="Unregister">✕</button>
              </div>`);
            row.querySelector(".iconbtn").onclick = async () => {
              try { await api("/v1/devices/" + encodeURIComponent(d.id), { method: "DELETE" }); renderDevices(); }
              catch (e) { alert(e.message); }
            };
            list.appendChild(row);
          }
        } catch (e) {
          tab.querySelector("#devList").innerHTML = `<div class="msg err">${esc(e.message)}</div>`;
        }
      }

      // ── Config ───────────────────────────────────────────────────────────
      async function renderConfig() {
        const tab = document.getElementById("tab");
        tab.innerHTML = `<div class="card"><h2>Config snapshot</h2><div id="cfg"><div class="empty">Loading…</div></div></div>`;
        const cfg = tab.querySelector("#cfg");
        try {
          const res = await api("/v1/sync");
          const servers = Array.isArray(res.payload.servers) ? res.payload.servers.length : 0;
          cfg.innerHTML = `
            <div class="meta" style="display:grid;gap:6px">
              <div>Revision <b>${res.version}</b></div>
              <div>Updated ${esc(new Date(res.updatedAt).toLocaleString())}</div>
              <div><b>${servers}</b> server${servers === 1 ? "" : "s"} (secret-free)</div>
            </div>`;
        } catch (e) {
          cfg.innerHTML = e.status === 404
            ? `<div class="empty">No config synced yet. Push from a ServerCase client (Settings → Cloud).</div>`
            : `<div class="msg err">${esc(e.message)}</div>`;
        }
      }

      // ── Boot ─────────────────────────────────────────────────────────────
      (async () => {
        if (!localStorage.getItem("sc.token")) return renderLogin();
        try {
          const me = await api("/v1/auth/me");
          renderDashboard(me.user);
        } catch {
          renderLogin("Session expired — sign in again.");
        }
      })();
    </script>
  </body>
</html>
