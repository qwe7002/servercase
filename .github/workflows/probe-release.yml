name: Probe release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            linker: gcc
          - target: aarch64-unknown-linux-gnu
            linker: aarch64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Install cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build probe
        working-directory: probe
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp "probe/target/${{ matrix.target }}/release/servercase-probe" \
            "dist/servercase-probe-${{ matrix.target }}"
          chmod 0755 "dist/servercase-probe-${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: servercase-probe-${{ matrix.target }}
          path: dist/servercase-probe-${{ matrix.target }}
          if-no-files-found: error

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/servercase-probe-*
